<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BE · Admin Panel</title>
<link rel="icon" href="brand/logo-full.png"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Barlow:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--thr:237,31,81;--bg:#050408;--panel:#0a0c10;--line:rgba(255,255,255,.08);--bone:#f2f0ec;--steel:#9aa0ab;--ghost:#5b606b;--grad:linear-gradient(120deg,#ed1f51,#f05825)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--bone);font-family:Inter,sans-serif;font-size:13px;min-height:100vh}
.eb{font-family:Barlow,sans-serif;font-weight:600;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ghost)}
h1,h2,.num{font-family:Montserrat,sans-serif}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:12.5px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:9px;color:var(--bone);padding:9px 11px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:rgba(var(--thr),.55)}
input[type=color]{padding:2px;height:36px;width:52px}
input[type=checkbox]{width:auto}
.panel{background:var(--panel);border:1px solid rgba(var(--thr),.16);border-radius:16px;padding:18px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--thr),.5),transparent)}
.btn{background:var(--grad);border:none;color:#fff;font-weight:600;font-size:12px;padding:10px 18px;border-radius:10px}
.btn:hover{filter:brightness(1.12)}
.btn2{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--steel);font-size:11.5px;padding:8px 14px;border-radius:9px}
.btn2:hover{border-color:rgba(var(--thr),.5);color:var(--bone)}
.btn-danger{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.35);color:#ff7a7a;font-size:11px;padding:7px 12px;border-radius:8px}
.chip{display:inline-flex;align-items:center;gap:5px;font-family:Barlow,sans-serif;font-weight:600;font-size:9px;letter-spacing:.14em;text-transform:uppercase;padding:3px 9px;border-radius:99px}
.chip.live{color:#2fe08c;border:1px solid rgba(47,224,140,.35);background:rgba(47,224,140,.07)}
.chip.pend{color:#ffc24b;border:1px solid rgba(255,194,75,.35);background:rgba(255,194,75,.07)}
/* login */
#login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse 60% 50% at 50% 0%,rgba(var(--thr),.12),transparent 60%),var(--bg)}
.lbox{width:min(380px,92vw);background:var(--panel);border:1px solid rgba(var(--thr),.22);border-radius:20px;padding:34px 30px;text-align:center;position:relative;overflow:hidden}
.lbox::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,rgba(var(--thr),.8),transparent)}
.lbox img{height:34px;margin-bottom:14px}
.lbox h1{font-size:17px;font-weight:800;letter-spacing:.02em}
.lbox p{color:var(--ghost);font-size:11px;margin:6px 0 20px}
.lbox input{margin-bottom:11px;text-align:center}
.lerr{display:none;color:#ff7a7a;font-size:11px;margin-top:12px}
.lnote{margin-top:18px;font-size:10px;color:var(--ghost);line-height:1.7;border-top:1px solid var(--line);padding-top:12px}
.shake{animation:shk .4s}
@keyframes shk{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
/* app shell */
#app{display:none;max-width:1180px;margin:0 auto;padding:26px 22px 80px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.top-l{display:flex;align-items:center;gap:14px}
.top-l img{height:26px}
.top h1{font-size:19px;font-weight:800}
.top .sub{font-size:11px;color:var(--ghost);margin-top:2px}
.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.tab{font-family:Barlow,sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--steel);background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:10px;padding:10px 15px;display:flex;align-items:center;gap:7px}
.tab i{font-size:14px}
.tab.on{color:#fff;background:linear-gradient(120deg,rgba(237,31,81,.18),rgba(240,88,37,.18));border-color:rgba(var(--thr),.5)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:820px){.grid2{grid-template-columns:1fr}}
.sect{margin-bottom:16px}
.sect .eb{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:10.5px;color:var(--steel);margin-bottom:5px}
.row{display:flex;gap:8px;align-items:center}
table.list{width:100%;border-collapse:collapse}
table.list th{font-family:Barlow,sans-serif;font-weight:600;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ghost);text-align:left;padding:6px 8px;border-bottom:1px solid var(--line)}
table.list td{padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;vertical-align:middle}
table.list tr:hover td{background:rgba(255,255,255,.02)}
.avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;object-position:top;border:1.5px solid rgba(var(--thr),.5);vertical-align:middle}
.avatar-fb{width:30px;height:30px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;background:var(--grad);font-weight:700;font-size:10px;color:#fff}
.rolechip{font-family:Barlow,sans-serif;font-weight:600;font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:99px;border:1px solid var(--line);color:var(--steel)}
.rolechip.founder{color:#ed6d8d;border-color:rgba(237,31,81,.4)}
.rolechip.admin{color:#ffc24b;border-color:rgba(255,194,75,.4)}
.icon-btn{background:none;border:none;color:var(--ghost);font-size:15px;padding:4px}
.icon-btn:hover{color:var(--bone)}
.toast{position:fixed;bottom:26px;left:50%;transform:translate(-50%,80px);background:#101318;border:1px solid rgba(47,224,140,.4);color:#2fe08c;font-size:12px;padding:11px 20px;border-radius:12px;transition:transform .35s cubic-bezier(.2,.95,.3,1.12);z-index:99}
.toast.on{transform:translate(-50%,0)}
.toast.err{border-color:rgba(255,60,60,.4);color:#ff7a7a}
/* modal */
#bk{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(14px);display:none;align-items:center;justify-content:center;z-index:50}
#bk.on{display:flex}
.sheet{width:min(520px,94vw);max-height:86vh;overflow:auto;background:#0b0d12;border:1px solid rgba(var(--thr),.3);border-radius:18px;padding:24px;animation:pop .38s cubic-bezier(.2,.95,.3,1.12)}
@keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.sheet h2{font-size:15px;margin-bottom:16px}
.setup{border:1px dashed rgba(255,194,75,.4);border-radius:14px;padding:16px;margin-bottom:18px}
.setup pre{background:#07080c;border:1px solid var(--line);border-radius:10px;padding:12px;font-size:10.5px;color:#9fe8c3;overflow:auto;margin:10px 0;max-height:220px}
.hint{font-size:10.5px;color:var(--ghost);line-height:1.7}
.src-light{width:9px;height:9px;border-radius:50%;display:inline-block;background:#3a3f4a}
.src-light.ok{background:#2fe08c;box-shadow:0 0 8px rgba(47,224,140,.7)}
.src-light.fail{background:#ff5252;box-shadow:0 0 8px rgba(255,82,82,.7)}
.warn-banner{border:1px solid rgba(255,194,75,.4);background:rgba(255,194,75,.06);color:#ffc24b;border-radius:12px;padding:11px 15px;font-size:11.5px;margin-bottom:16px;display:none}
</style>
</head>
<body>

<!-- LOGIN (only markup in DOM until an authorized role enters — admin UI is injected post-auth) -->
<div id="login">
  <div class="lbox" id="lbox">
    <img src="brand/logo-mark.png" alt="Broken English" onerror="this.style.display='none'"/>
    <h1>Admin Panel</h1>
    <p>Back office · Founders &amp; Admin only</p>
    <input id="lu" placeholder="Username" autocomplete="username"/>
    <input id="lp" type="password" placeholder="Password" autocomplete="current-password"/>
    <button class="btn" style="width:100%" onclick="doLogin()">Enter Back Office</button>
    <div class="lerr" id="lerr">Invalid credentials.</div>
    <div class="lnote">Convenience lock for an internal tool: this is client-side auth on a public static site — keys are visible in source. Do not store sensitive data here.</div>
  </div>
</div>

<div id="app"></div>
<div id="bk" onclick="if(event.target===this)closeSheet()"><div class="sheet" id="sheetBody"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════ CONFIG ═══════════ */
const ACAD={url:'https://baazubvfsrpmbfmrzumw.supabase.co',key:'sb_publishable_cpAjOHoZL3AMZHaNieb_0A_Tb1kspmh'};
const DB=supabase.createClient(ACAD.url,ACAD.key);
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
let ME=null,CFG={},CFG_TABLE_OK=false,ROLES=[];

/* Which config keys the dashboards already read (honesty labels) */
const WIRED={'team.photos':true};

const DEFAULTS={
 'team.photos':{sreekanth:'photos/Sreekanth.jpg',hasnu:'photos/Hasnu.png',jazeel:'photos/Jazeel.png'},
 'courses.catalogue':[
  {slug:'group-foundation',label:'Foundation',group:32,mc:8,oneonone:2,days:63,active:true},
  {slug:'group-upgrade',label:'Upgrade',group:32,mc:8,oneonone:2,days:63,active:true},
  {slug:'elite-oneonone',label:'Elite (1:1)',group:0,mc:0,oneonone:20,days:30,active:true},
  {slug:'ielts-group',label:'IELTS Group',group:24,mc:0,oneonone:0,days:60,active:true},
  {slug:'ielts-oneonone',label:'IELTS 1:1',group:0,mc:0,oneonone:12,days:45,active:true},
  {slug:'recorded',label:'Recorded Course (coming)',group:0,mc:0,oneonone:0,days:180,active:false}],
 'sources.sheets':{
  master:'1Q4cHAm4LrhLM_EcDt0v_X2te038OZM267Q3W5ZeD5XI',
  assess:'1YLd_SWtFUCzxAF-BxDx8tDHK8NFMHYzCyhVOQkQwSYI',
  schedule:'1TfL61kl3VeTk7vYhl4IgTgtpi3yhicdCbUPr9QMydBw',
  tracker:'1rmhxfNZxAEupBQvLIzDY71TurYxSJkRrO4zY7ZxHUTE'},
 'globe.settings':{boot:true,rotate:.55,atmosphere:'#4d9fff',arcTime:1700,pointSize:.35,
  red:[{label:'Dubai',lat:25.2,lng:55.3},{label:'Doha',lat:25.3,lng:51.5},{label:'Riyadh',lat:24.7,lng:46.7},{label:'Kuwait',lat:29.4,lng:48},{label:'Muscat',lat:23.6,lng:58.4},{label:'Bangalore',lat:12.97,lng:77.59},{label:'Mumbai',lat:19.07,lng:72.88}],
  blue:[{label:'London',lat:51.5,lng:-0.1},{label:'Toronto',lat:43.7,lng:-79.4},{label:'Sydney',lat:-33.9,lng:151.2},{label:'Singapore',lat:1.35,lng:103.8},{label:'New York',lat:40.7,lng:-74},{label:'Delhi',lat:28.6,lng:77.2},{label:'Chennai',lat:13.08,lng:80.27}]},
 'content.settings':{missionTarget:1000,tagline:'Real-time overview of the empire. Data. Decisions. Impact.',
  links:[{label:'Assessment Tool',url:'https://broken-english-assessment.onrender.com'},{label:'Production Suite',url:'https://mediabrkn01-crypto.github.io/Production-Suite/'}],
  deptCards:{academics:true,sales:true,media:true,projects:true}},
 'sales.keywords':{contacted:['contact','call'],interested:['interest'],demo:['demo','assess'],
  counsellors:['Ashika','Alisha','Hiba','Sumayya','Diya']}
};

const SETUP_SQL=`-- Run in Supabase SQL editor · project baazubvfsrpmbfmrzumw (check URL bar!)
create table if not exists site_config(
  key text primary key,
  value jsonb,
  updated_at timestamp default now());
alter table site_config enable row level security;
drop policy if exists "allow all site_config" on site_config;
create policy "allow all site_config" on site_config for all using (true) with check (true);

-- Seed the admin login (change the password right after first sign-in):
insert into roles (name, role, username, password)
select 'Admin','admin','admin','admin123'
where not exists (select 1 from roles where username='admin');`;

/* ═══════════ AUTH (role-gated: admin DOM is never built for other roles) ═══════════ */
async function doLogin(){
  const u=$('lu').value.trim().toLowerCase(),p=$('lp').value;
  if(!u||!p)return err('Enter username and password.');
  const {data,error}=await DB.from('roles').select('*').eq('username',u).eq('password',p).maybeSingle();
  if(error||!data)return err('Invalid credentials.');
  if(!['founder','admin'].includes(data.role))return err('No admin access — founders & admin only. Use academics.html.');
  ME=data;
  try{localStorage.setItem('be_session',JSON.stringify({u:data.username,n:data.name,r:data.role,t:Date.now()}));}catch(_){}
  enter();
}
function err(m){const e=$('lerr');e.textContent=m;e.style.display='block';$('lbox').classList.remove('shake');void $('lbox').offsetWidth;$('lbox').classList.add('shake');}
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&$('login').style.display!=='none'&&!ME)doLogin();});
async function trySSO(){
  try{
    const s=JSON.parse(localStorage.getItem('be_session')||'null');
    if(!s||Date.now()-s.t>432e5)return;
    const {data}=await DB.from('roles').select('*').eq('username',s.u).maybeSingle();
    if(data&&['founder','admin'].includes(data.role)){ME=data;enter();}
  }catch(_){}
}
function signOut(){try{localStorage.removeItem('be_session');}catch(_){}ME=null;location.reload();}

/* ═══════════ BOOT ═══════════ */
async function enter(){
  $('login').style.display='none';
  const app=$('app');app.style.display='block';
  app.innerHTML=`
  <div class="top">
    <div class="top-l">
      <img src="brand/logo-full.png" alt="" onerror="this.style.display='none'"/>
      <div><h1>ADMIN PANEL</h1><div class="sub">Back office · signed in as <b>${esc(ME.name)}</b> (${esc(ME.role)})</div></div>
    </div>
    <div class="row">
      <span class="chip live" title="keys the dashboards read today">● live key</span>
      <span class="chip pend" title="stored now, dashboards wire in next pass">● stored</span>
      <button class="btn2" onclick="signOut()"><i class="ti ti-logout"></i> Sign out</button>
    </div>
  </div>
  <div class="warn-banner" id="pwWarn"><i class="ti ti-alert-triangle"></i> You are using the default <b>admin/admin123</b> login — change the password now (Identity &amp; Team → Admin → edit).</div>
  <div id="setupZone"></div>
  <div class="tabs" id="tabs"></div>
  <div id="tabBody"></div>`;
  if(ME.username==='admin'&&ME.password==='admin123')$('pwWarn').style.display='block';
  const TABS=[['team','ti-users','Identity & Team'],['courses','ti-school','Courses'],['sources','ti-database','Data Sources'],['globe','ti-world','Visual & Globe'],['content','ti-notes','Content'],['sales','ti-trending-up','Sales Strategy']];
  $('tabs').innerHTML=TABS.map(([k,i,l])=>`<button class="tab" data-t="${k}" onclick="goTab('${k}')"><i class="ti ${i}"></i>${l}</button>`).join('');
  await loadCfg();
  await loadRoles();
  goTab('team');
}
async function loadCfg(){
  CFG=JSON.parse(JSON.stringify(DEFAULTS));
  const {data,error}=await DB.from('site_config').select('*');
  if(error){CFG_TABLE_OK=false;
    $('setupZone').innerHTML=`<div class="setup"><div class="eb" style="color:#ffc24b">One-time setup required</div>
    <div class="hint">The <b>site_config</b> table doesn't exist yet. Until you run this, edits can't be saved (defaults shown below are read-only). Paste in the Supabase SQL editor — project <b>baazubvfsrpmbfmrzumw</b>:</div>
    <pre id="sqlPre">${esc(SETUP_SQL)}</pre>
    <button class="btn2" onclick="navigator.clipboard.writeText(document.getElementById('sqlPre').textContent).then(()=>toast('SQL copied'))"><i class="ti ti-copy"></i> Copy SQL</button>
    <button class="btn2" onclick="location.reload()" style="margin-left:8px"><i class="ti ti-refresh"></i> I ran it — recheck</button></div>`;
    return;}
  CFG_TABLE_OK=true;
  (data||[]).forEach(r=>{CFG[r.key]=r.value;});
}
async function loadRoles(){
  const {data}=await DB.from('roles').select('*').order('role').order('name');
  ROLES=data||[];
}
async function saveCfg(key,value){
  if(!CFG_TABLE_OK)return toast('Run the setup SQL first — nothing was saved.',true);
  const {error}=await DB.from('site_config').upsert({key,value,updated_at:new Date().toISOString()});
  if(error)return toast('Save failed: '+error.message,true);
  CFG[key]=value;
  toast(WIRED[key]?'Saved — live on next dashboard refresh.':'Stored — dashboards read this key in the next wiring pass.');
}
function toast(m,bad){const t=$('toast');t.textContent=m;t.className='toast on'+(bad?' err':'');clearTimeout(t._h);t._h=setTimeout(()=>t.className='toast',3200);}
function goTab(k){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.t===k));({team:rTeam,courses:rCourses,sources:rSources,globe:rGlobe,content:rContent,sales:rSales})[k]();}
function badge(key){return WIRED[key]?'<span class="chip live">live</span>':'<span class="chip pend">stored · wiring pending</span>';}
function closeSheet(){$('bk').classList.remove('on');}
function openSheet(html){$('sheetBody').innerHTML=html;$('bk').classList.add('on');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});

/* ═══════════ TAB 1 · IDENTITY & TEAM (roles table = LIVE writes) ═══════════ */
function avatarFor(u){
  const p=(CFG['team.photos']||{})[u.username];
  const init=((u.name||'').match(/\b[A-Za-z]/g)||['B','E']).join('').slice(0,2).toUpperCase();
  return p?`<img class="avatar" src="${esc(p)}" onerror="this.outerHTML='<span class=avatar-fb>${init}</span>'"/>`:`<span class="avatar-fb">${init}</span>`;
}
function rTeam(){
  $('tabBody').innerHTML=`
  <div class="panel sect">
    <div class="eb">Team logins · roles table <span class="chip live">live — both apps read this table</span></div>
    <table class="list"><thead><tr><th></th><th>Name</th><th>Username</th><th>Role</th><th>Password</th><th>Photo</th><th></th></tr></thead>
    <tbody>${ROLES.map((u,i)=>`<tr>
      <td>${avatarFor(u)}</td>
      <td><b>${esc(u.name)}</b></td>
      <td style="color:var(--steel)">${esc(u.username)}</td>
      <td><span class="rolechip ${esc(u.role)}">${esc(u.role)}</span></td>
      <td style="color:var(--ghost)"><span id="pw${i}">••••••</span> <button class="icon-btn" onclick="togglePw(${i})"><i class="ti ti-eye"></i></button></td>
      <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--ghost);font-size:10.5px">${esc((CFG['team.photos']||{})[u.username]||'—')}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="btn2" onclick="editUser(${i})"><i class="ti ti-pencil"></i> Edit</button>
        <button class="btn-danger" onclick="delUser(${i})"><i class="ti ti-trash"></i></button>
      </td></tr>`).join('')}</tbody></table>
    <div style="margin-top:14px"><button class="btn" onclick="editUser(-1)"><i class="ti ti-user-plus"></i> Add user</button></div>
    <div class="hint" style="margin-top:10px">Photos: upload the image to the repo's <b>photos/</b> folder (filenames are case-sensitive on GitHub Pages), then put the path here, e.g. <b>photos/Hasnu.png</b>. The founder deck reads <b>team.photos</b> ${badge('team.photos')}.</div>
  </div>
  <div class="panel sect">
    <div class="eb">Trainers roster</div>
    <div class="hint">Trainer add / delete / batch assignment lives in the <a href="academics.html" target="_blank" style="color:#ed6d8d">Academics Portal</a> (admin view) — it already has the guarded CRUD. Logins for trainers are managed in the table above.</div>
  </div>`;
}
function togglePw(i){const el=$('pw'+i);el.textContent=el.textContent==='••••••'?ROLES[i].password:'••••••';}
function editUser(i){
  const u=i<0?{name:'',username:'',password:'',role:'trainer'}:ROLES[i];
  const photo=(CFG['team.photos']||{})[u.username]||'';
  openSheet(`<h2>${i<0?'Add user':'Edit · '+esc(u.name)}</h2>
    <div class="fld"><label>Name</label><input id="eu_n" value="${esc(u.name)}"/></div>
    <div class="fld"><label>Username</label><input id="eu_u" value="${esc(u.username)}" ${i<0?'':'disabled'}/></div>
    <div class="fld"><label>Password</label><input id="eu_p" value="${esc(u.password)}"/></div>
    <div class="fld"><label>Role</label><select id="eu_r">${['founder','admin','academic_head','trainer'].map(r=>`<option ${r===u.role?'selected':''}>${r}</option>`).join('')}</select></div>
    <div class="fld"><label>Photo path / URL (repo photos/… recommended)</label><input id="eu_ph" value="${esc(photo)}" placeholder="photos/Name.png"/></div>
    <div class="row" style="justify-content:flex-end;margin-top:16px">
      <button class="btn2" onclick="closeSheet()">Cancel</button>
      <button class="btn" onclick="saveUser(${i})">Save</button></div>`);
}
async function saveUser(i){
  const rec={name:$('eu_n').value.trim(),username:$('eu_u').value.trim().toLowerCase(),password:$('eu_p').value,role:$('eu_r').value};
  if(!rec.name||!rec.username||!rec.password)return toast('Name, username, password required.',true);
  let error;
  if(i<0){
    if(ROLES.some(r=>r.username===rec.username))return toast('Username already exists.',true);
    ({error}=await DB.from('roles').insert(rec));
  }else({error}=await DB.from('roles').update(rec).eq('username',ROLES[i].username));
  if(error)return toast('DB error: '+error.message,true);
  const ph=$('eu_ph').value.trim(),photos={...(CFG['team.photos']||{})};
  if(ph)photos[rec.username]=ph;else delete photos[rec.username];
  if(JSON.stringify(photos)!==JSON.stringify(CFG['team.photos']||{}))await saveCfg('team.photos',photos);
  else toast('Saved — live immediately (roles table).');
  closeSheet();await loadRoles();rTeam();
}
async function delUser(i){
  const u=ROLES[i];
  if(u.username===ME.username)return toast("You can't delete your own login while signed in.",true);
  if(!confirm(`Delete login "${u.name}" (${u.username})? This is permanent.`))return;
  const {error}=await DB.from('roles').delete().eq('username',u.username);
  if(error)return toast('DB error: '+error.message,true);
  await loadRoles();rTeam();toast('Deleted.');
}

    <tbody id="crsBody">${cat.map((c,i)=>`<tr>
      <td><input type="checkbox" data-i="${i}" data-f="active" ${c.active?'checked':''}/></td>
      <td><input data-i="${i}" data-f="label" value="${esc(c.label)}" style="min-width:130px"/></td>
      <td><input data-i="${i}" data-f="slug" value="${esc(c.slug)}" style="min-width:120px;color:var(--ghost)"/></td>

      <td><input type="number" data-i="${i}" data-f="mc" value="${c.mc}" style="width:64px"/></td>

      <td><input type="number" data-i="${i}" data-f="days" value="${c.days}" style="width:64px"/></td>

      <button class="btn2" onclick="addCourseRow()"><i class="ti ti-plus"></i> Add course</button>
      <button class="btn" onclick="saveCourses()"><i class="ti ti-device-floppy"></i> Save catalogue</button>
    </div>
    <div class="hint" style="margin-top:10px">Structure math the dashboards use today: Foundation/Upgrade = 32 group + 8 masterclass + 2 one-on-one over 63 days; Elite ≈ 20 one-on-ones / 30 days. Edits here replace the hardcoded map once the wiring pass lands.</div>
  </div>`;
}
function addCourseRow(){
  const tb=$('crsBody'),i=tb.children.length;
  tb.insertAdjacentHTML('beforeend',`<tr>
   <td><input type="checkbox" data-i="${i}" data-f="active" checked/></td>
   <td><input data-i="${i}" data-f="label" value="" placeholder="Label" style="min-width:130px"/></td>
   <td><input data-i="${i}" data-f="slug" value="" placeholder="slug-name" style="min-width:120px"/></td>
   <td><input type="number" data-i="${i}" data-f="group" value="0" style="width:64px"/></td>
   <td><input type="number" data-i="${i}" data-f="mc" value="0" style="width:64px"/></td>
   <td><input type="number" data-i="${i}" data-f="oneonone" value="0" style="width:64px"/></td>
   <td><input type="number" data-i="${i}" data-f="days" value="60" style="width:64px"/></td>
   <td><button class="btn-danger" onclick="this.closest('tr').remove()"><i class="ti ti-trash"></i></button></td></tr>`);
}
function saveCourses(){
  const rows=[...$('crsBody').children].map(tr=>{
    const g=f=>tr.querySelector(`[data-f=${f}]`);
    return {slug:g('slug').value.trim(),label:g('label').value.trim(),active:g('active').checked,
      group:+g('group').value||0,mc:+g('mc').value||0,oneonone:+g('oneonone').value||0,days:+g('days').value||0};
  }).filter(c=>c.slug&&c.label);
  if(!rows.length)return toast('Catalogue can\'t be empty.',true);
  saveCfg('courses.catalogue',rows);
}

/* ═══════════ TAB 3 · DATA SOURCES ═══════════ */
function rSources(){
  const s=CFG['sources.sheets']||{};
  const F=(k,l)=>`<div class="fld"><label>${l}</label>
    <div class="row"><span class="src-light" id="li_${k}"></span>
    <input id="src_${k}" value="${esc(s[k]||'')}"/>
    <button class="btn2" onclick="testSheet('${k}')">Test</button></div></div>`;
  $('tabBody').innerHTML=`
  <div class="panel sect">
    <div class="eb">Google Sheet IDs ${badge('sources.sheets')}</div>
    ${F('master','Master Student List')}${F('assess','Assessment / Leads')}${F('schedule','Trainer Weekly Schedule')}${F('tracker','Batch/Session Tracker')}
    <button class="btn" onclick="saveSources()"><i class="ti ti-device-floppy"></i> Save sheet IDs</button>
    <div class="hint" style="margin-top:10px">Test = fetches the sheet's gviz CSV (first tab). Sheet must be shared "anyone with link". Green = readable right now.</div>
  </div>
  <div class="panel sect">
    <div class="eb">Supabase backends (read-only here)</div>
    <div class="hint">Academics/auth: <b>baazubvfsrpmbfmrzumw</b> · Media: <b>fevqnpllmarhoqdzpatq</b>. Changing these means editing the constants in index/academics/admin — deliberately not editable from a public page.</div>
  </div>`;
}
async function testSheet(k){
  const id=$('src_'+k).value.trim(),li=$('li_'+k);li.className='src-light';
  if(!id)return li.className='src-light fail';
  try{
    const r=await fetch(`https://docs.google.com/spreadsheets/d/${id}/gviz/tq?tqx=out:csv`);
    const t=await r.text();
    li.className='src-light '+((r.ok&&t.split('\n').length>1)?'ok':'fail');
    toast(li.className.includes('ok')?`Readable · ${t.split('\n').length} rows in first tab.`:'Fetch failed — check ID & sharing.',!li.className.includes('ok'));
  }catch(_){li.className='src-light fail';toast('Fetch failed — check ID & sharing.',true);}
}
function saveSources(){
  saveCfg('sources.sheets',{master:$('src_master').value.trim(),assess:$('src_assess').value.trim(),schedule:$('src_schedule').value.trim(),tracker:$('src_tracker').value.trim()});
}

/* ═══════════ TAB 4 · VISUAL & GLOBE ═══════════ */
function cityRows(list,pfx){
  return list.map((c,i)=>`<tr>
    <td><input data-p="${pfx}" data-f="label" value="${esc(c.label||'')}" style="min-width:110px"/></td>
    <td><input type="number" step="0.01" data-p="${pfx}" data-f="lat" value="${c.lat}" style="width:86px"/></td>
    <td><input type="number" step="0.01" data-p="${pfx}" data-f="lng" value="${c.lng}" style="width:86px"/></td>
    <td><button class="btn-danger" onclick="this.closest('tr').remove()"><i class="ti ti-trash"></i></button></td></tr>`).join('');
}
function rGlobe(){
  const g=CFG['globe.settings']||{};
  $('tabBody').innerHTML=`
  <div class="panel sect">
    <div class="eb">Globe behaviour ${badge('globe.settings')}</div>
    <div class="grid2">
      <div>
        <div class="fld"><label><input type="checkbox" id="g_boot" ${g.boot!==false?'checked':''}/> Cinematic boot sequence on load</label></div>
        <div class="fld"><label>Auto-rotate speed (default .55)</label><input type="number" step="0.05" id="g_rot" value="${g.rotate??.55}"/></div>
        <div class="fld"><label>Arc animation time ms (default 1700)</label><input type="number" id="g_arc" value="${g.arcTime??1700}"/></div>
        <div class="fld"><label>Point size (default .35)</label><input type="number" step="0.05" id="g_pt" value="${g.pointSize??.35}"/></div>
        <div class="fld"><label>Atmosphere color</label><input type="color" id="g_atm" value="${esc(g.atmosphere||'#4d9fff')}"/></div>
      </div>
      <div class="hint">These map 1:1 to the Globe.gl calls in the founder deck (<b>autoRotateSpeed</b>, <b>arcDashAnimateTime</b>, <b>pointRadius</b>, <b>atmosphereColor</b>, boot on/off). Stored now; the deck reads <b>globe.settings</b> in the wiring pass.</div>
    </div>
  </div>
  <div class="grid2">
    <div class="panel sect"><div class="eb" style="color:#ed6d8d">Network cities · red (Gulf + India)</div>
      <table class="list"><thead><tr><th>City</th><th>Lat</th><th>Lng</th><th></th></tr></thead><tbody id="redBody">${cityRows(g.red||[],'red')}</tbody></table>
      <button class="btn2" style="margin-top:10px" onclick="addCity('redBody','red')"><i class="ti ti-plus"></i> Add city</button></div>
    <div class="panel sect"><div class="eb" style="color:#7db6ff">Network cities · blue (global)</div>
      <table class="list"><thead><tr><th>City</th><th>Lat</th><th>Lng</th><th></th></tr></thead><tbody id="blueBody">${cityRows(g.blue||[],'blue')}</tbody></table>
      <button class="btn2" style="margin-top:10px" onclick="addCity('blueBody','blue')"><i class="ti ti-plus"></i> Add city</button></div>
  </div>
  <div style="margin-top:14px"><button class="btn" onclick="saveGlobe()"><i class="ti ti-device-floppy"></i> Save globe settings</button></div>`;
}
function addCity(tb,p){$(tb).insertAdjacentHTML('beforeend',cityRows([{label:'',lat:0,lng:0}],p));}
function saveGlobe(){
  const grab=tb=>[...$(tb).children].map(tr=>{const g=f=>tr.querySelector(`[data-f=${f}]`);
    return {label:g('label').value.trim(),lat:+g('lat').value,lng:+g('lng').value};})
    .filter(c=>c.label&&isFinite(c.lat)&&isFinite(c.lng));
  saveCfg('globe.settings',{boot:$('g_boot').checked,rotate:+$('g_rot').value||.55,arcTime:+$('g_arc').value||1700,
    pointSize:+$('g_pt').value||.35,atmosphere:$('g_atm').value,red:grab('redBody'),blue:grab('blueBody')});
}

function saveContent(){
  const links=$('c_links').value.split('\n').map(l=>l.split('|')).filter(a=>a.length>=2)

  const deptCards={};['academics','sales','media','projects'].forEach(k=>deptCards[k]=$('dc_'+k).checked);
  saveCfg('content.settings',{missionTarget:+$('c_target').value||1000,tagline:$('c_tag').value.trim(),links,deptCards});
