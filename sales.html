<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Broken English · Sales Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Barlow:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--pink:#ed1f51;--org:#f05825;--grad:linear-gradient(120deg,#ed1f51,#f05825);--bg:#050408;--pn:#0a0c10;--ln:rgba(255,255,255,.10);--ghost:#6b7280;--ok:#2fe08c;--warn:#ffc24b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:#fff;font-family:Inter,sans-serif;font-size:14px}
.eb{font-family:Barlow;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--ghost)}
h1,h2,h3{font-family:Montserrat}
.wrap{max-width:1180px;margin:0 auto;padding:18px}
.top{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;padding:14px 0;border-bottom:1px solid var(--ln);margin-bottom:16px}
.pn{background:var(--pn);border:1px solid var(--ln);border-radius:14px;padding:14px;margin-bottom:14px}
.pn h2{font-size:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.btn{background:var(--grad);border:0;color:#fff;font-family:Barlow;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-size:11px;padding:9px 14px;border-radius:9px;cursor:pointer}
.btn.g{background:transparent;border:1px solid var(--ln);color:#cfd3da}
.btn.sm{padding:6px 10px;font-size:10px}
input,select,textarea{background:#0d1016;border:1px solid var(--ln);color:#fff;border-radius:9px;padding:9px 11px;font-family:Inter;font-size:13px;width:100%}
.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px;margin-bottom:8px}
.li{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.07);flex-wrap:wrap}
.li .t{font-weight:600}.li .m{font-size:11.5px;color:var(--ghost)}
.chip{font-family:Barlow;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:20px;border:1px solid var(--ln)}
.hot{color:#ff5a5a;border-color:rgba(255,90,90,.4)}.warm{color:var(--warn);border-color:rgba(255,194,75,.4)}.cold{color:#6fa8ff;border-color:rgba(111,168,255,.4)}
.ok{color:var(--ok);border-color:rgba(47,224,140,.4)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--pn);border:1px solid var(--ln);border-radius:12px;padding:12px}
.kpi .n{font-family:Montserrat;font-weight:800;font-size:22px;margin-top:3px}
.login{max-width:340px;margin:12vh auto;background:var(--pn);border:1px solid var(--ln);border-radius:16px;padding:24px;text-align:center}
.login input{margin-bottom:10px}
.hide{display:none}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50;padding:16px}
.mbg.on{display:flex}
.modal{background:#0c0f14;border:1px solid var(--ln);border-radius:16px;padding:20px;width:440px;max-width:100%;max-height:88vh;overflow:auto}
.err{color:#ff6b6b;font-size:12px;margin-top:8px}
.empty{color:var(--ghost);font-size:12.5px;padding:10px 0}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
</style></head><body>

<div id="loginView" class="login">
  <img id="lgLogo" alt="Broken English" style="width:180px;margin-bottom:6px"/>
  <div class="eb" style="margin-bottom:16px">Sales Portal</div>
  <input id="u" placeholder="Username" autocomplete="username"/>
  <input id="p" type="password" placeholder="Password" autocomplete="current-password"/>
  <button class="btn" style="width:100%" onclick="doLogin()">Enter</button>
  <div id="lerr" class="err"></div>
</div>

<div id="app" class="wrap hide">
  <div class="top">
    <div style="display:flex;align-items:center;gap:12px">
      <img id="hdLogo" alt="BE" style="height:30px"/>
      <div><div class="eb">Sales Portal</div><div id="who" style="font-weight:600"></div></div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span id="clockState" class="chip">—</span>
      <button id="clockBtn" class="btn sm" onclick="toggleClock()">Clock In</button>
      <button class="btn g sm" onclick="markLeave()">Mark Leave</button>
      <button class="btn g sm" onclick="logout()">Sign out</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="pn">
    <h2>My Tasks <button class="btn sm" onclick="openTask()">+ Task</button></h2>
    <div id="taskList" class="empty">Loading…</div>
  </div>

  <div class="pn">
    <h2>Leads <span><input id="q" placeholder="Search name / phone" style="width:190px" oninput="renderLeads()"/> <button class="btn sm" onclick="openLead()">+ Lead</button></span></h2>
    <div id="leadList" class="empty">Loading…</div>
  </div>

  <div class="pn" id="teamPn">
    <h2>Team Today</h2>
    <div id="teamList" class="empty">Loading…</div>
  </div>
</div>

<div class="mbg" id="mLead"><div class="modal">
  <h3 id="leadTitle" style="font-size:15px;margin-bottom:12px">New Lead</h3>
  <div class="row"><input id="ld_name" placeholder="Name"/><input id="ld_contact" placeholder="Phone"/></div>
  <div class="row"><input id="ld_ad" placeholder="Ad code (BE103)"/><select id="ld_course"><option value="">Course interest…</option></select></div>
  <div class="row">
    <select id="ld_stage"></select>
    <select id="ld_temp"><option>Hot</option><option selected>Warm</option><option>Cold</option></select>
  </div>
  <select id="ld_assign" class="hide"></select>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
    <button class="btn g" onclick="close_('mLead')">Cancel</button><button class="btn" onclick="saveLead()">Save</button>
  </div>
</div></div>

<div class="mbg" id="mFU"><div class="modal">
  <h3 id="fuTitle" style="font-size:15px;margin-bottom:4px">Log Follow-up</h3>
  <div id="fuHist" style="font-size:12px;color:var(--ghost);margin-bottom:12px"></div>
  <div class="row">
    <select id="fu_out">
      <option>Connected</option><option>DNP</option><option>Busy</option>
      <option>Call Back Requested</option><option>No Response</option><option>Wrong Number</option>
    </select>
    <select id="fu_stage"></select>
  </div>
  <textarea id="fu_remark" rows="3" placeholder="Remark (what did they say?)" style="margin-bottom:8px"></textarea>
  <div class="row"><input id="fu_next" type="date" title="Next action date"/><select id="fu_temp"><option>Hot</option><option>Warm</option><option>Cold</option></select></div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
    <button class="btn g" onclick="close_('mFU')">Cancel</button><button class="btn" onclick="saveFU()">Save Follow-up</button>
  </div>
</div></div>

<div class="mbg" id="mTask"><div class="modal">
  <h3 style="font-size:15px;margin-bottom:12px">New Task</h3>
  <input id="tk_title" placeholder="Task title" style="margin-bottom:8px"/>
  <div class="row">
    <select id="tk_type"><option>follow-up</option><option>DNP-reschedule</option><option>schedule-assessment</option><option>fee-collection</option></select>
    <input id="tk_due" type="date"/>
  </div>
  <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
    <button class="btn g" onclick="close_('mTask')">Cancel</button><button class="btn" onclick="saveTask()">Save</button>
  </div>
</div></div>

/* ---------- AUTH ---------- */
async function doLogin(){
  const u=$('u').value.trim().toLowerCase(),p=$('p').value;
  if(!u||!p){$('lerr').textContent='Enter username and password';return;}
  const {data,error}=await sb.from('roles').select('*').eq('username',u).eq('password',p).maybeSingle();
  if(error){$('lerr').textContent='Cannot reach database.';return;}
  if(!data){$('lerr').textContent='Wrong username or password.';return;}
  if(!['counsellor','counsellor_head','founder'].includes(data.role)){$('lerr').textContent='This portal is for the sales team.';return;}
  ME=data;localStorage.be_sales=JSON.stringify({u:data.username,n:data.name,r:data.role,t:Date.now()});
  start();
}
function logout(){localStorage.removeItem('be_sales');location.reload();}
$('p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function start(){
  $('loginView').classList.add('hide');$('app').classList.remove('hide');
  $('who').textContent=ME.name+' · '+(isHead()?'Head':'Counsellor');
  if(!isHead())$('teamPn').classList.add('hide');
  STAGES.forEach(s=>{['ld_stage','fu_stage'].forEach(id=>{const o=document.createElement('option');o.textContent=s;$(id).appendChild(o);});});
  await loadCourses();await loadClock();await loadLeads();await loadTasks();if(isHead())loadTeam();
}

/* ---------- CLOCK IN / OUT ---------- */
async function loadClock(){
  const {data}=await sb.from('staff_attendance').select('*').eq('username',ME.username).eq('work_date',today()).maybeSingle();
  CLOCK=data||null;paintClock();
}
function paintClock(){
  const st=$('clockState'),b=$('clockBtn');
  if(!CLOCK||!CLOCK.clock_in){st.innerHTML='<span class="dot" style="background:#555"></span>Not clocked in';st.className='chip';b.textContent='Clock In';b.classList.remove('g');}
  else if(!CLOCK.clock_out){const t=new Date(CLOCK.clock_in).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});st.innerHTML='<span class="dot" style="background:var(--ok)"></span>In since '+t;st.className='chip ok';b.textContent='Clock Out';}
  else{const m=CLOCK.minutes||0;st.innerHTML='<span class="dot" style="background:#555"></span>Done · '+Math.floor(m/60)+'h '+(m%60)+'m';st.className='chip';b.textContent='Clocked Out';}
}
async function toggleClock(){
  const now=new Date().toISOString();
  if(!CLOCK||!CLOCK.clock_in){
    const {error}=await sb.from('staff_attendance').upsert({username:ME.username,name:ME.name,role:ME.role,work_date:today(),clock_in:now},{onConflict:'username,work_date'});
    if(error)return alert('Clock-in failed: '+error.message);
  }else if(!CLOCK.clock_out){
    const mins=Math.round((Date.now()-new Date(CLOCK.clock_in).getTime())/60000);
    const {error}=await sb.from('staff_attendance').update({clock_out:now,minutes:mins}).eq('id',CLOCK.id);
    if(error)return alert('Clock-out failed: '+error.message);
  }else return;
  await loadClock();if(isHead())loadTeam();
}
async function markLeave(){
  const d=prompt('Leave date (YYYY-MM-DD):',today());if(!d)return;
  const r=prompt('Reason (optional):')||'';
  const {error}=await sb.from('leave_days').upsert({username:ME.username,name:ME.name,leave_date:d,reason:r},{onConflict:'username,leave_date'});
  alert(error?'Failed: '+error.message:'Leave marked for '+d);if(isHead())loadTeam();
}
async function loadTeam(){
  const [{data:att},{data:lv},{data:staff}]=await Promise.all([
    sb.from('staff_attendance').select('*').eq('work_date',today()),
    sb.from('leave_days').select('*').eq('leave_date',today()),
    sb.from('roles').select('name,username,role')]);
  const inMap={};(att||[]).forEach(a=>inMap[a.username]=a);
  const lvMap={};(lv||[]).forEach(l=>lvMap[l.username]=l);
  const rows=(staff||[]).filter(s=>s.role!=='admin');
  $('teamList').className='';
  $('teamList').innerHTML=rows.map(s=>{
    const a=inMap[s.username],l=lvMap[s.username];
    let chip='<span class="chip">Not in</span>';
    if(l)chip='<span class="chip warm">On leave</span>';
    else if(a&&a.clock_in&&!a.clock_out)chip='<span class="chip ok">Working</span>';
    else if(a&&a.clock_out)chip='<span class="chip">Done '+Math.floor((a.minutes||0)/60)+'h</span>';
    return '<div class="li"><span class="t">'+esc(s.name)+'</span><span class="m">'+esc(s.role)+'</span>'+chip+'</div>';}).join('')||'<div class="empty">No staff rows.</div>';
}

/* ---------- COURSES ---------- */
async function loadCourses(){
  const {data}=await sb.from('courses').select('name').eq('active',true);
  COURSES=(data||[]).map(c=>c.name);
  COURSES.forEach(c=>{const o=document.createElement('option');o.textContent=c;$('ld_course').appendChild(o);});
}

/* ---------- LEADS ---------- */
async function loadLeads(){
  let q=sb.from('leads').select('*').order('created_at',{ascending:false});
  if(!isHead())q=q.eq('assigned_to',ME.name);
  const {data}=await q;LEADS=data||[];renderLeads();paintKPIs();
}
function renderLeads(){
  const term=($('q').value||'').toLowerCase();
  const rows=LEADS.filter(l=>!term||(l.name||'').toLowerCase().includes(term)||(l.contact||'').includes(term));
  $('leadList').className='';
  $('leadList').innerHTML=rows.length?rows.slice(0,60).map(l=>{
    const tc=(l.temperature||'').toLowerCase();
    return '<div class="li"><span class="t">'+esc(l.name||'Unknown')+'</span>'
      +'<span class="m">'+esc(l.contact||'')+(l.ad_code?' · '+esc(l.ad_code):'')+(isHead()&&l.assigned_to?' · '+esc(l.assigned_to):'')+'</span>'
      +'<span class="chip '+(tc==='hot'?'hot':tc==='cold'?'cold':'warm')+'">'+esc(l.temperature||'—')+'</span>'
      +'<span class="chip">'+esc(l.stage||'New')+'</span>'
      +'<button class="btn sm" onclick="openFU(\''+l.lead_id+'\')">Follow-up</button></div>';}).join(''):'<div class="empty">No leads yet. Add one with + Lead.</div>';
}
function paintKPIs(){
  const mine=LEADS,hot=mine.filter(l=>(l.temperature||'')==='Hot').length;
  const enr=mine.filter(l=>l.stage==='Enrolled').length;
  const open=TASKS.filter(t=>t.status==='open').length;
  const due=TASKS.filter(t=>t.status==='open'&&t.due_date&&t.due_date<=today()).length;
  $('kpis').innerHTML=[['Leads',mine.length],['Hot',hot],['Enrolled',enr],['Open tasks',open],['Due today',due]]
    .map(k=>'<div class="kpi"><div class="eb">'+k[0]+'</div><div class="n">'+k[1]+'</div></div>').join('');
}
function openLead(){
  $('leadTitle').textContent='New Lead';
  ['ld_name','ld_contact','ld_ad'].forEach(i=>$(i).value='');
  if(isHead()){$('ld_assign').classList.remove('hide');$('ld_assign').innerHTML='';
    sb.from('roles').select('name,role').then(({data})=>{(data||[]).filter(r=>r.role&&r.role.indexOf('counsellor')===0).forEach(r=>{const o=document.createElement('option');o.textContent=r.name;$('ld_assign').appendChild(o);});});}
  $('mLead').classList.add('on');
}
async function saveLead(){
  const name=$('ld_name').value.trim(),contact=$('ld_contact').value.replace(/[^0-9]/g,'');
  if(!contact)return alert('Phone number required — it is the lead key.');
  const {data:ex}=await sb.from('leads').select('lead_id,name').eq('contact',contact).maybeSingle();
  if(ex)return alert('Lead already exists: '+(ex.name||ex.lead_id));
  const {count}=await sb.from('leads').select('*',{count:'exact',head:true});
  const lid='BE-L'+String((count||0)+1).padStart(4,'0');
  const assigned=isHead()&&$('ld_assign').value?$('ld_assign').value:ME.name;
  const {error}=await sb.from('leads').insert({lead_id:lid,name:name,contact:contact,ad_code:$('ld_ad').value.trim(),
    course_interest:$('ld_course').value,stage:$('ld_stage').value,temperature:$('ld_temp').value,assigned_to:assigned});
  if(error)return alert('Save failed: '+error.message);
  close_('mLead');loadLeads();
}

/* ---------- FOLLOW-UPS ---------- */
let FU_LEAD=null;
async function openFU(lid){
  FU_LEAD=LEADS.find(l=>l.lead_id===lid);if(!FU_LEAD)return;
  const {data}=await sb.from('follow_ups').select('*').eq('lead_id',lid).order('seq');
  const n=(data||[]).length;
  $('fuTitle').textContent='Follow-up '+(n+1)+' · '+(FU_LEAD.name||FU_LEAD.contact);
  $('fuHist').innerHTML=n?(data.map(f=>'#'+f.seq+' '+f.fu_date+' · '+esc(f.call_outcome||'')+(f.remark?' — '+esc(f.remark):'')).join('<br>')
    +(n>=5?'<br><b style="color:var(--warn)">5 follow-ups done — closing after this.</b>':'')):'First contact.';
  $('fu_stage').value=FU_LEAD.stage||'New';$('fu_temp').value=FU_LEAD.temperature||'Warm';
  $('fu_remark').value='';$('fu_next').value='';
  $('mFU').classList.add('on');
}
async function saveFU(){
  if(!FU_LEAD)return;
  const {data:prev}=await sb.from('follow_ups').select('seq').eq('lead_id',FU_LEAD.lead_id);
  const seq=(prev||[]).length+1;
  const out=$('fu_out').value,stage=$('fu_stage').value,next=$('fu_next').value||null;
  const {error}=await sb.from('follow_ups').insert({lead_id:FU_LEAD.lead_id,seq:seq,call_outcome:out,stage:stage,
    remark:$('fu_remark').value.trim(),next_action_date:next,by_user:ME.name});
  if(error)return alert('Save failed: '+error.message);
  const upd={stage:stage,temperature:$('fu_temp').value};
  if(seq>=5&&['New','Contacted','Details Shared','Follow Up Later'].includes(stage)){upd.stage='Closed';upd.closed_reason='5 follow-ups, no progress';}
  await sb.from('leads').update(upd).eq('lead_id',FU_LEAD.lead_id);
  if(next){await sb.from('tasks').insert({lead_id:FU_LEAD.lead_id,task_type:out==='DNP'?'DNP-reschedule':'follow-up',
    title:(out==='DNP'?'Call again: ':'Follow up: ')+(FU_LEAD.name||FU_LEAD.contact),due_date:next,assigned_to:ME.name});}
  close_('mFU');loadLeads();loadTasks();
}

/* ---------- TASKS ---------- */
async function loadTasks(){
  let q=sb.from('tasks').select('*').eq('status','open').order('due_date');
  if(!isHead())q=q.eq('assigned_to',ME.name);
  const {data}=await q;TASKS=data||[];
  $('taskList').className='';
  $('taskList').innerHTML=TASKS.length?TASKS.map(t=>{
    const late=t.due_date&&t.due_date<today();
    return '<div class="li"><span class="t">'+esc(t.title||t.task_type)+'</span>'
      +'<span class="m" style="color:'+(late?'var(--warn)':'var(--ghost)')+'">'+esc(t.task_type)+(t.due_date?' · due '+t.due_date:'')+'</span>'
      +'<button class="btn sm" onclick="doneTask(\''+t.id+'\')">Done</button></div>';}).join(''):'<div class="empty">No open tasks.</div>';
  paintKPIs();
}
async function saveTask(){
  const t=$('tk_title').value.trim();if(!t)return alert('Title required');
  const {error}=await sb.from('tasks').insert({title:t,task_type:$('tk_type').value,due_date:$('tk_due').value||null,assigned_to:ME.name});
  if(error)return alert('Failed: '+error.message);
  close_('mTask');loadTasks();
}
function openTask(){$('tk_title').value='';$('tk_due').value=today();$('mTask').classList.add('on');}
async function doneTask(id){
  await sb.from('tasks').update({status:'done',done_at:new Date().toISOString(),done_by:ME.name}).eq('id',id);
  await loadTasks();
  const undo=confirm('Task marked done. Click Cancel to UNDO if this was a mistake.');
  if(!undo){await sb.from('tasks').update({status:'open',done_at:null,revoked_at:new Date().toISOString()}).eq('id',id);loadTasks();}
}

/* ---------- session restore ---------- */
(function(){try{const s=JSON.parse(localStorage.be_sales||'null');
  if(s&&Date.now()-s.t<12*3600*1000){sb.from('roles').select('*').eq('username',s.u).maybeSingle().then(({data})=>{if(data){ME=data;start();}});}}catch(e){}})();
</script></body></html>
